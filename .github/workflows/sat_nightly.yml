name: SAT Nightly Sequential Extractor

on:
  schedule:
    # 11:00 PM CST (Central Standard Time) = 5:00 AM UTC
    - cron: '0 5 * * *'
  workflow_dispatch: # Permite correrlo manualmente desde la web

jobs:
  extract:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 hours max

    steps:
    - name: Check out repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm ci

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps chromium

    - name: Run SAT Orchestrator
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        DIRECT_URL: ${{ secrets.DIRECT_URL }}
      run: node scripts/nightly_sat_extractor.js
